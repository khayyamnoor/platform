
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFeasible | Futuristic Business Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #22d3ee;
            --accent-indigo: #6366f1;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Print/PDF Improvements */
        @media print {
            body {
                background: white !important;
                color: black !important;
                background-image: none !important;
            }
            .glass-panel {
                background: white !important;
                color: black !important;
                border: 1px solid #ddd !important;
                backdrop-filter: none !important;
                box-shadow: none !important;
            }
            .text-white, .text-slate-200, .text-slate-300, .text-slate-400 {
                color: black !important;
            }
            aside, .z-40, button, .z-20 {
                display: none !important;
            }
            .absolute.inset-0 {
                position: relative !important;
                background: white !important;
                padding: 0 !important;
            }
            .max-w-6xl {
                max-width: 100% !important;
            }
            canvas {
                max-width: 100% !important;
            }
        }
    </style>
<script type="importmap">

    "html2canvas": "https://esm.sh/html2canvas@^1.4.1"
  }
}

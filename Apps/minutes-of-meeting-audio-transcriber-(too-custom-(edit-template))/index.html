<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minutes Of Meeting Audio Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'wave': 'wave 1.2s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
            },
            keyframes: {
              wave: {
                '0%, 100%': { transform: 'scaleY(0.5)' },
                '50%': { transform: 'scaleY(1.5)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      
      /* Print Styles for PDF Export */
      @media print {
        @page {
          margin: 2.5cm;
          size: A4;
        }
        body {
          background-color: white !important;
          color: black !important;
          padding: 0 !important;
          margin: 0 !important;
        }
        .no-print, header, footer, button, nav {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
        #results-container {
          box-shadow: none !important;
          border: none !important;
          padding: 0 !important;
          width: 100% !important;
          max-width: none !important;
        }
        /* Refined Print Typography */
        .prose {
          max-width: none !important;
          color: black !important;
        }
        .prose h1 { 
          font-size: 26pt !important; 
          font-weight: 800 !important; 
          margin-bottom: 20pt !important; 
          color: black !important;
          border-bottom: 3px solid #333;
          padding-bottom: 8pt;
        }
        .prose h2 { 
          font-size: 20pt !important; 
          margin-top: 30pt !important; 
          margin-bottom: 12pt !important; 
          border-bottom: 1px solid #ddd; 
          padding-bottom: 6pt;
          color: black !important;
        }
        .prose h3 { 
          font-size: 16pt !important; 
          margin-top: 20pt !important; 
          margin-bottom: 10pt !important; 
          color: black !important;
        }
        .prose p, .prose li { 
          font-size: 12pt !important; 
          line-height: 1.6 !important; 
          color: black !important;
        }
        .prose ul { padding-left: 1.5em !important; margin-bottom: 15pt !important; }
        .prose li { margin-bottom: 6pt !important; }
        .prose strong { font-weight: 700 !important; }
        
        /* Avoid breaking headings across pages */
        h1, h2, h3 { page-break-after: avoid; }
        p, blockquote, li { page-break-inside: avoid; }
      }
      
      /* Markdown Styles */
      .prose h1 { font-size: 2rem; font-weight: 800; color: #1e293b; margin-bottom: 1.5rem; letter-spacing: -0.025em; }
      .prose h2 { font-size: 1.5rem; font-weight: 700; color: #334155; margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
      .prose h3 { font-size: 1.25rem; font-weight: 600; color: #475569; margin-top: 1.5rem; margin-bottom: 0.75rem; }
      .prose p { margin-bottom: 1.25rem; color: #475569; line-height: 1.8; }
      .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; color: #475569; }
      .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1.25rem; color: #475569; }
      .prose li { margin-bottom: 0.5rem; }
      .prose strong { font-weight: 700; color: #0f172a; }
      .prose blockquote { border-left: 4px solid #e2e8f0; padding-left: 1.25rem; font-style: italic; color: #64748b; margin-bottom: 1.25rem; }
    </style>
